<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="" />
        <meta name="theme-color" content="#404040" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet" />

        <title>Dex</title>
    </head>

    <body class="size-full bg-primary antialiased">
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
        <script>
            // Force light theme — kill any stale dark-mode class from prior localStorage state
            document.documentElement.classList.remove("dark-mode");
            try { localStorage.removeItem("ui-theme"); } catch (e) {}
            // Apply flavor before paint to avoid FOUC
            try {
                var f = localStorage.getItem("dex.flavor") || "basic";
                if (f === "fun") document.documentElement.setAttribute("data-flavor", "fun");
            } catch (e) {}
        </script>
    </body>
</html>
